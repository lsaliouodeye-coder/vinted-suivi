<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Vinted</title>
</head>
<body style="margin:0;">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

.vt-root {
  --bg: #171512;
  --paper: #e7d9ba;
  --paper-dark: #cbb98c;
  --paper-line: #b8a377;
  --ink: #241f1c;
  --ink-soft: #55493a;
  --stamp-red: #a63a2e;
  --transit-mustard: #c2932f;
  --route-teal: #2f6b5e;
  --paper-shadow: rgba(0,0,0,0.35);

  background: var(--bg);
  color: var(--paper);
  font-family: 'Inter', sans-serif;
  border-radius: 12px;
  padding: 28px 24px 40px;
  min-height: 100vh;
  box-sizing: border-box;
}
.vt-root * { box-sizing: border-box; }

.vt-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 20px;
  margin-bottom: 28px;
  border-bottom: 1px solid rgba(231,217,186,0.2);
  padding-bottom: 20px;
}
.vt-title-block .vt-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--transit-mustard);
  margin: 0 0 6px;
}
.vt-title-block h1 {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  font-size: 32px;
  margin: 0;
  color: var(--paper);
}

.vt-postmark {
  width: 118px;
  height: 118px;
  border-radius: 50%;
  border: 3px dashed var(--paper);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transform: rotate(-6deg);
  flex-shrink: 0;
  font-family: 'Oswald', sans-serif;
}
.vt-postmark .vt-pm-val {
  font-size: 22px;
  font-weight: 700;
  color: var(--paper);
  line-height: 1;
}
.vt-postmark .vt-pm-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--transit-mustard);
  margin-top: 6px;
  text-align: center;
}

.vt-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
}
.vt-tab {
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 13px;
  font-weight: 600;
  background: transparent;
  color: rgba(231,217,186,0.55);
  border: 1px solid rgba(231,217,186,0.25);
  border-radius: 6px;
  padding: 9px 18px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.vt-tab:hover { color: var(--paper); border-color: rgba(231,217,186,0.5); }
.vt-tab.active {
  background: var(--paper);
  color: var(--ink);
  border-color: var(--paper);
}

.vt-addbar {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}
.vt-btn-add {
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
  font-size: 13px;
  background: var(--stamp-red);
  color: var(--paper);
  border: none;
  border-radius: 6px;
  padding: 11px 20px;
  cursor: pointer;
}
.vt-btn-add:hover { filter: brightness(1.1); }
.vt-btn-sync {
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
  font-size: 13px;
  background: transparent;
  color: var(--stamp-red);
  border: 1.5px solid var(--stamp-red);
  border-radius: 6px;
  padding: 10px 18px;
  cursor: pointer;
}
.vt-btn-sync:hover { filter: brightness(1.1); }
.vt-btn-sync:disabled { opacity: 0.6; cursor: wait; }
.vt-api-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(231,217,186,0.58);
  border: 1px solid rgba(231,217,186,0.22);
  border-radius: 999px;
  padding: 8px 11px;
}
.vt-api-badge.active {
  color: var(--route-teal);
  border-color: rgba(47,107,94,0.65);
  background: rgba(47,107,94,0.12);
}

#vt-notifs {
  margin-bottom: 14px;
}
.vt-notif {
  background: rgba(231,217,186,0.08);
  border: 1px solid rgba(231,217,186,0.18);
  color: var(--paper);
  padding: 8px 10px;
  border-radius: 8px;
  margin-top: 8px;
  font-size: 12px;
}

.vt-form {
  background: rgba(231,217,186,0.06);
  border: 1px solid rgba(231,217,186,0.18);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 24px;
  display: none;
}
.vt-form.open { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; }
.vt-form label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--transit-mustard);
  display: block;
  margin-bottom: 6px;
}
.vt-form input, .vt-form select, .vt-form textarea {
  width: 100%;
  background: var(--paper);
  color: var(--ink);
  border: none;
  border-radius: 5px;
  padding: 9px 10px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
}
.vt-form textarea {
  resize: vertical;
  min-height: 44px;
  font-family: 'Inter', sans-serif;
}
.vt-form .vt-form-notes,
.vt-form .vt-form-postit { grid-column: 1 / -1; }
.vt-form-title {
  grid-column: 1 / -1;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 12px;
  font-weight: 600;
  color: var(--transit-mustard);
  margin: 0 0 -2px;
}
.vt-form .vt-form-actions { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 4px; }
.vt-form .vt-save {
  background: var(--route-teal);
  color: var(--paper);
  border: none;
  border-radius: 6px;
  padding: 10px 18px;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.vt-form .vt-save:disabled {
  opacity: 0.65;
  cursor: wait;
}
.vt-form .vt-cancel {
  background: transparent;
  color: rgba(231,217,186,0.6);
  border: 1px solid rgba(231,217,186,0.3);
  border-radius: 6px;
  padding: 10px 18px;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.vt-form input[type="file"] {
  padding: 7px 8px;
}
.vt-form input[type="file"]::file-selector-button {
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 4px;
  padding: 6px 9px;
  margin-right: 8px;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  font-size: 10px;
  cursor: pointer;
}

.vt-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
@media (max-width: 800px) {
  .vt-board { grid-template-columns: 1fr; }
}
.vt-col-head {
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  font-size: 13px;
  letter-spacing: 0.06em;
  font-weight: 600;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px dashed rgba(231,217,186,0.25);
  display: flex;
  justify-content: space-between;
}
.vt-col[data-status="a_preparer"] .vt-col-head { color: var(--stamp-red); }
.vt-col[data-status="expedie"] .vt-col-head { color: var(--transit-mustard); }
.vt-col[data-status="livre"] .vt-col-head { color: var(--route-teal); }

.vt-card {
  background: var(--paper);
  color: var(--ink);
  border-radius: 3px;
  padding: 14px 14px 12px;
  margin-bottom: 14px;
  position: relative;
  box-shadow: 3px 4px 0 var(--paper-shadow);
}
.vt-card::before {
  content: "";
  position: absolute;
  top: -1px; left: 16px;
  width: 12px; height: 12px;
  background: var(--bg);
  border-radius: 50%;
  border-bottom: 1px solid var(--paper-line);
}
.vt-card::after {
  content: "";
  position: absolute;
  top: 8px; left: 0; right: 0;
  border-top: 1px dashed var(--paper-line);
}
.vt-card-body { margin-top: 10px; }
.vt-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.vt-card-article {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 15px;
  line-height: 1.2;
}
.vt-card-price {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 15px;
  color: var(--stamp-red);
  white-space: nowrap;
}
.vt-card-buyer {
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 3px;
}
.vt-card-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-soft);
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  border-top: 1px solid rgba(36,31,28,0.12);
  padding-top: 8px;
}
.vt-card-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.vt-card-actions button {
  flex: 1;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.03em;
  border: none;
  border-radius: 4px;
  padding: 7px 6px;
  cursor: pointer;
}
.vt-btn-next { background: var(--ink); color: var(--paper); }
.vt-btn-edit { background: transparent; color: var(--route-teal); border: 1px solid var(--route-teal) !important; }
.vt-btn-del { background: transparent; color: var(--stamp-red); border: 1px solid var(--stamp-red) !important; }
.vt-card-notes {
  font-family: 'Inter', sans-serif;
  font-size: 11.5px;
  color: var(--ink-soft);
  background: rgba(36,31,28,0.06);
  border-radius: 5px;
  padding: 7px 9px;
  margin-top: 8px;
  white-space: pre-wrap;
  word-break: break-word;
}
.vt-card-notes .vt-notes-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  opacity: 0.75;
  display: block;
  margin-bottom: 2px;
}
.vt-attachments {
  border-top: 1px solid rgba(36,31,28,0.12);
  margin-top: 9px;
  padding-top: 9px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.vt-attach-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 5px;
}
.vt-attach-list {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.vt-thumb,
.vt-doc {
  width: 44px;
  height: 44px;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid rgba(36,31,28,0.2);
  background: rgba(36,31,28,0.07);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
}
.vt-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.vt-doc {
  color: var(--stamp-red);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
}
.vt-empty {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: rgba(231,217,186,0.35);
  padding: 20px 0;
  text-align: center;
  border: 1px dashed rgba(231,217,186,0.15);
  border-radius: 8px;
}

.vt-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 14px;
  margin-bottom: 28px;
}
.vt-stat-card {
  background: rgba(231,217,186,0.06);
  border: 1px solid rgba(231,217,186,0.15);
  border-radius: 8px;
  padding: 16px;
}
.vt-stat-num {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--paper);
}
.vt-stat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--transit-mustard);
  margin-top: 4px;
}
.vt-section-title {
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 14px;
  font-weight: 600;
  color: var(--paper);
  margin: 0 0 14px;
}
.vt-chart {
  display: flex;
  align-items: flex-end;
  gap: 14px;
  height: 160px;
  padding: 0 4px;
  margin-bottom: 30px;
  border-bottom: 1px solid rgba(231,217,186,0.2);
}
.vt-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  height: 100%;
}
.vt-bar {
  width: 60%;
  background: linear-gradient(to top, var(--stamp-red), var(--transit-mustard));
  border-radius: 3px 3px 0 0;
  min-height: 3px;
}
.vt-bar-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: rgba(231,217,186,0.55);
  margin-top: 8px;
  text-transform: uppercase;
}
.vt-bar-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--paper);
  margin-bottom: 4px;
}
.vt-toplist { display: flex; flex-direction: column; gap: 8px; }
.vt-toprow {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
}
.vt-toprow .vt-topname { width: 130px; flex-shrink: 0; color: var(--paper); text-transform: uppercase; font-size: 11px; }
.vt-topbar-track { flex: 1; background: rgba(231,217,186,0.1); border-radius: 4px; height: 10px; overflow: hidden; }
.vt-topbar-fill { height: 100%; background: var(--route-teal); }
.vt-topval { width: 60px; text-align: right; color: var(--transit-mustard); }

.vt-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.vt-modal.open { display: flex; }
.vt-modal-box {
  width: min(90vw, 1000px);
  height: min(80vh, 800px);
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  display: flex;
  flex-direction: column;
}
.vt-modal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: #1d1a17;
  color: #fff;
  font-family: 'Inter', sans-serif;
}
.vt-modal-close {
  background: var(--stamp-red);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
}
.vt-modal-frame {
  width: 100%;
  height: 100%;
  border: 0;
  background: #fff;
}

@media screen and (max-width: 375px) {
  .vt-root{padding:14px 10px 24px !important;}
  .vt-header{flex-direction:column;align-items:flex-start !important;}
  .vt-postmark{width:90px;height:90px;}
  .vt-title-block h1{font-size:24px !important;}
  .vt-addbar,.vt-tabs,.vt-form-actions,.vt-card-actions{flex-direction:column;}
  .vt-btn-add,.vt-btn-sync,.vt-card-actions button{width:100%;}
  .vt-board{grid-template-columns:1fr !important;}
  .vt-form.open{grid-template-columns:1fr !important;}
  .vt-stat-card{padding:12px;}
}

</style>

<div class="vt-root">
  <div class="vt-header">
    <div class="vt-title-block">
      <p class="vt-eyebrow">Suivi des ventes</p>
      <h1>Mes commandes Vinted</h1>
    </div>
    <div class="vt-postmark">
      <div class="vt-pm-val" id="vt-pm-val">0€</div>
      <div class="vt-pm-label">ce mois-ci</div>
    </div>
  </div>

  <div id="vt-notifs" aria-live="polite"></div>

  <div class="vt-tabs">
    <button class="vt-tab active" data-tab="board">Commandes</button>
    <button class="vt-tab" data-tab="stats">Statistiques</button>
  </div>

  <div id="vt-view-board">
    <div class="vt-addbar">
      <button class="vt-btn-add" id="vt-toggle-form">+ Nouvelle commande</button>
      <button class="vt-btn-sync" id="vt-sync-vinted">⟳ Synchroniser avec Vinted</button>
      <span class="vt-api-badge" id="vt-api-status">Mode navigateur</span>
    </div>

    <div class="vt-form" id="vt-form">
      <p class="vt-form-title" id="vt-form-title">Nouvelle commande</p>
      <div>
        <label>Article</label>
        <input type="text" id="f-article" placeholder="Ex. Pull en laine" />
      </div>
      <div>
        <label>Acheteur</label>
        <input type="text" id="f-buyer" placeholder="Pseudo Vinted" />
      </div>
      <div>
        <label>Prix (€)</label>
        <input type="number" id="f-price" placeholder="15" step="0.01" />
      </div>
      <div>
        <label>Catégorie</label>
        <input type="text" id="f-category" placeholder="Vêtements, chaussures..." list="vt-categories" />
        <datalist id="vt-categories">
          <option value="Autre">
          <option value="Vêtements">
          <option value="Chaussures">
          <option value="A mettre a vendre">
        </datalist>
      </div>
      <div>
        <label>N° de suivi</label>
        <input type="text" id="f-tracking" placeholder="Optionnel" />
      </div>
      <div>
        <label>Photos suivi</label>
        <input type="file" id="f-tracking-files" accept="image/*,.pdf,application/pdf" multiple />
      </div>
      <div>
        <label>Bons d'achat</label>
        <input type="file" id="f-voucher-files" accept="image/*,.pdf,application/pdf" multiple />
      </div>
      <div>
        <label>Date de vente</label>
        <input type="date" id="f-date" />
      </div>
      <div class="vt-form-notes">
        <label>Notes</label>
        <textarea id="f-notes" rows="2" placeholder="Ex. Imprimer le bordereau, remise en boîte aux lettres..."></textarea>
      </div>
      <div class="vt-form-postit">
        <label>Post-it</label>
        <textarea id="f-postit" rows="2" placeholder="Note rapide visible sur la carte..."></textarea>
      </div>
      <div class="vt-form-actions">
        <button class="vt-save" id="vt-save-order">Enregistrer</button>
        <button class="vt-cancel" id="vt-cancel-form">Annuler</button>
      </div>
    </div>

    <div class="vt-board">
      <div class="vt-col" data-status="a_preparer">
        <div class="vt-col-head"><span>À préparer</span><span id="count-a_preparer">0</span></div>
        <div class="vt-col-body" id="col-a_preparer"></div>
      </div>
      <div class="vt-col" data-status="expedie">
        <div class="vt-col-head"><span>Expédiée</span><span id="count-expedie">0</span></div>
        <div class="vt-col-body" id="col-expedie"></div>
      </div>
      <div class="vt-col" data-status="livre">
        <div class="vt-col-head"><span>Livrée</span><span id="count-livre">0</span></div>
        <div class="vt-col-body" id="col-livre"></div>
      </div>
    </div>
  </div>

  <div id="vt-view-stats" style="display:none;">
    <div class="vt-stats-grid">
      <div class="vt-stat-card">
        <div class="vt-stat-num" id="stat-total-rev">0€</div>
        <div class="vt-stat-label">Revenu total</div>
      </div>
      <div class="vt-stat-card">
        <div class="vt-stat-num" id="stat-count">0</div>
        <div class="vt-stat-label">Commandes</div>
      </div>
      <div class="vt-stat-card">
        <div class="vt-stat-num" id="stat-avg">0€</div>
        <div class="vt-stat-label">Panier moyen</div>
      </div>
      <div class="vt-stat-card">
        <div class="vt-stat-num" id="stat-pending">0</div>
        <div class="vt-stat-label">À préparer</div>
      </div>
    </div>

    <p class="vt-section-title">Revenu des 6 derniers mois</p>
    <div class="vt-chart" id="vt-chart"></div>

    <p class="vt-section-title">Top catégories</p>
    <div class="vt-toplist" id="vt-toplist"></div>
  </div>
</div>

<div class="vt-modal" id="vt-pdf-modal">
  <div class="vt-modal-box">
    <div class="vt-modal-head">
      <span>Aperçu PDF</span>
      <button class="vt-modal-close" id="vt-pdf-close">Fermer</button>
    </div>
    <iframe class="vt-modal-frame" id="vt-pdf-frame"></iframe>
  </div>
</div>

  async function loadOrders() {
  const { data, error } = await supabaseClient
    .from('orders')
    .select('*')
    .order('date', { ascending: false });

  if (error) {
    console.error(error);
    notify("Erreur Supabase : " + error.message);
    return;
  }

  orders = data || [];
  setApiStatus("Supabase connecté", true);
  render();
}

  async function saveOrders() {
    if (apiMode) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    } catch (e) {
      console.error('Erreur de sauvegarde', e);
    }
  }

  function uid() {
    return 'o_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  }

  async function addOrder(data) {
    const payload = orderPayload(data);
    if (apiMode) {
      const result = await apiRequest('/api/orders', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      orders = Array.isArray(result.orders) ? result.orders : [result.order].concat(orders);
      render();
      notify('Commande ajoutée');
      return;
    }

    orders.unshift(Object.assign({ id: uid() }, payload));
    await saveOrders();
    render();
    notify('Commande ajoutée');
  }

  async function updateOrder(id, data) {
    const patch = {
      article: data.article || 'Article',
      buyer: data.buyer || '',
      price: parseFloat(data.price) || 0,
      category: data.category || 'Autre',
      tracking: data.tracking || '',
      notes: data.notes || '',
      postit: data.postit || '',
      date: data.date || new Date().toISOString().slice(0,10)
    };

    if (apiMode) {
      const result = await apiRequest('/api/orders/' + encodeURIComponent(id), {
        method: 'PATCH',
        body: JSON.stringify(patch)
      });
      orders = Array.isArray(result.orders) ? result.orders : orders;
      render();
      notify('Commande mise à jour');
      return;
    }

    const order = orders.find(o => o.id === id);
    if (!order) return;
    Object.assign(order, patch);
    await saveOrders();
    render();
    notify('Commande mise à jour');
  }

  async function syncWithVinted() {
    const profileId = prompt(
      "Colle ton ID de profil Vinted (le nombre dans l'URL vinted.fr/member/XXXXXXX) :",

    localStorage.setItem('vinted-profile-id', profileId.trim());

    const cookie = prompt(

    );

    const btn = root.querySelector('#vt-sync-vinted');
    const originalLabel = btn.textContent;
    btn.disabled = true;

      render();

      alert(
        result.added > 0

          : 'Aucune nouvelle vente a importer (deja a jour).'
      );

      alert('Echec de la synchronisation : ' + err.message + '\n\nLe cookie a peut-etre expire : reconnecte-toi sur vinted.fr et reessaie.');
    } finally {
      btn.disabled = false;
      btn.textContent = originalLabel;
    }
  }

 const order = orders.find(o=>o.id===id);
 if(!order) return;

 let next = order.status;

 if(next==="a_preparer") next="expedie";
 else if(next==="expedie") next="livre";

 const {error}=await supabaseClient

 if(error) throw error;

 await loadOrders();
 notify("Statut mis à jour");
}

  async function deleteOrder(id) {
    if (apiMode) {
      const result = await apiRequest('/api/orders/' + encodeURIComponent(id), { method: 'DELETE' });
      orders = Array.isArray(result.orders) ? result.orders : orders.filter(o => o.id !== id);
      render();
      notify('Commande supprimée');
      return;
    }

    orders = orders.filter(o => o.id !== id);
    await saveOrders();
    render();
    notify('Commande supprimée');

  function statusLabel(s) {
    if (s === 'a_preparer') return { next: 'Marquer expédiée' };
    if (s === 'expedie') return { next: 'Marquer livrée' };
    return { next: null };
  }

  function renderCard(o) {
    const nextBtn = statusLabel(o.status).next;
    return `
      <div class="vt-card" data-id="${o.id}">
        <div class="vt-card-body">
          <div class="vt-card-top">
            <div class="vt-card-article">${escapeHtml(o.article)}</div>
            <div class="vt-card-price">${euro(o.price)}</div>
          </div>
          <div class="vt-card-buyer">${o.buyer ? '@' + escapeHtml(o.buyer) : 'Acheteur non renseigné'}</div>
          <div class="vt-card-meta">
            <span>${escapeHtml(o.category)}</span>
            <span>${formatDate(o.date)}</span>
          </div>
          ${o.tracking ? `<div class="vt-card-meta"><span>Suivi</span><span>${escapeHtml(o.tracking)}</span></div>` : ''}
          ${o.notes ? `<div class="vt-card-notes"><span class="vt-notes-label">Notes</span>${escapeHtml(o.notes)}</div>` : ''}
          ${o.postit ? `<div class="vt-card-notes"><span class="vt-notes-label">Post-it</span>${escapeHtml(o.postit)}</div>` : ''}
          ${renderAttachments(o)}
          <div class="vt-card-actions">
            ${nextBtn ? `<button class="vt-btn-next" data-action="next" data-id="${o.id}">${nextBtn}</button>` : ''}
            <button class="vt-btn-edit" data-action="edit" data-id="${o.id}">Modifier</button>
            <button class="vt-btn-del" data-action="del" data-id="${o.id}">Suppr.</button>
          </div>
        </div>
      </div>
    `;
  }

  function getAttachments(order, key) {
    return order.attachments && Array.isArray(order.attachments[key])
      ? order.attachments[key]
      : [];
  }

  function renderAttachments(order) {
    const trackingPhotos = getAttachments(order, 'trackingPhotos');
    const vouchers = getAttachments(order, 'vouchers');
    if (!trackingPhotos.length && !vouchers.length) return '';
    return `
      <div class="vt-attachments">
        ${renderAttachmentGroup('Preuves suivi', trackingPhotos)}
        ${renderAttachmentGroup("Bons d'achat", vouchers)}
      </div>
    `;
  }

  function renderAttachmentGroup(title, files) {
    if (!files.length) return '';
    return `
      <div>
        <div class="vt-attach-title">${title}</div>
        <div class="vt-attach-list">${files.map(renderAttachment).join('')}</div>
      </div>
    `;
  }

  function renderAttachment(file) {
    const type = file.type || '';
    const name = file.name || 'Pièce jointe';
    const href = escapeHtml(file.dataUrl || file.url || '#');
    const label = type.includes('pdf') ? 'PDF' : 'IMG';
    if (type.startsWith('image/')) {
      return `<a class="vt-thumb" href="${href}" target="_blank" rel="noopener" download="${escapeHtml(name)}" title="${escapeHtml(name)}"><img src="${href}" alt="${escapeHtml(name)}" /></a>`;
    }
    if (type.includes('pdf')) {
      return `<a class="vt-doc" href="${href}" target="_blank" rel="noopener" data-pdf="${href}" title="${escapeHtml(name)}">${label}</a>`;
    }
    return `<a class="vt-doc" href="${href}" target="_blank" rel="noopener" download="${escapeHtml(name)}" title="${escapeHtml(name)}">${label}</a>`;
  }

  function formatDate(d) {
    try {
      const dt = new Date(d);
      return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
    } catch(e) { return d; }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'amp;','<':'lt;','>':'gt;','"':'quot;',"'":'39;'}[c]));
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error('Impossible de lire ' + file.name));
      reader.readAsDataURL(file);
    });
  }

  async function compressImage(file) {
    const original = await readFileAsDataUrl(file);
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, MAX_IMAGE_SIDE / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', IMAGE_QUALITY));
      };
      img.onerror = () => resolve(original);
      img.src = original;
    });
  }

  async function fileToAttachment(file) {
    const isImage = file.type && file.type.startsWith('image/');
    const dataUrl = isImage ? await compressImage(file) : await readFileAsDataUrl(file);
    const maxChars = apiMode ? MAX_API_ATTACHMENT_CHARS : MAX_LOCAL_ATTACHMENT_CHARS;
    if (dataUrl.length > maxChars) {
      const target = apiMode ? "l'API locale" : 'le stockage local';
      throw new Error(file.name + ' est trop lourd pour ' + target + '.');
    }
    return {
      id: uid(),
      name: file.name,
      type: isImage ? 'image/jpeg' : (file.type || 'application/octet-stream'),
      dataUrl,
      addedAt: new Date().toISOString()
    };
  }

  function collectAttachments(inputId) {
    const input = root.querySelector('#' + inputId);
    const files = Array.from(input.files || []);
    return Promise.all(files.map(fileToAttachment));
  }

  function render() {
    ['a_preparer', 'expedie', 'livre'].forEach(status => {
      const list = orders.filter(o => o.status === status);
      const col = root.querySelector('#col-' + status);
      col.innerHTML = list.length
        ? list.map(renderCard).join('')
        : '<div class="vt-empty">Aucune commande</div>';
      root.querySelector('#count-' + status).textContent = list.length;
    });

    const now = new Date();
    const thisMonthRev = orders
      .filter(o => {
        const d = new Date(o.date);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      })
      .reduce((sum, o) => sum + o.price, 0);
    root.querySelector('#vt-pm-val').textContent = euro(thisMonthRev);

    renderStats();
  }

  function renderStats() {
    const totalRev = orders.reduce((s, o) => s + o.price, 0);
    root.querySelector('#stat-total-rev').textContent = euro(totalRev);
    root.querySelector('#stat-count').textContent = orders.length;
    root.querySelector('#stat-avg').textContent = orders.length ? euro(totalRev / orders.length) : '0€';
    root.querySelector('#stat-pending').textContent = orders.filter(o => o.status === 'a_preparer').length;

    const months = [];
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleDateString('fr-FR', { month: 'short' }) });
    }
    const monthTotals = months.map(m => {
      const rev = orders
        .filter(o => {
          const d = new Date(o.date);
          return d.getFullYear() === m.year && d.getMonth() === m.month;
        })
        .reduce((s, o) => s + o.price, 0);
      return { label: m.label, rev };
    });
    const maxRev = Math.max(...monthTotals.map(m => m.rev), 1);
    const chart = root.querySelector('#vt-chart');
    chart.innerHTML = monthTotals.map(m => `
      <div class="vt-bar-wrap">
        <div class="vt-bar-val">${m.rev > 0 ? euro(m.rev) : ''}</div>
        <div class="vt-bar" style="height:${Math.max((m.rev / maxRev) * 100, 2)}%"></div>
        <div class="vt-bar-label">${m.label}</div>
      </div>
    `).join('');

    const catMap = {};
    orders.forEach(o => {
      catMap[o.category] = (catMap[o.category] || 0) + o.price;
    });
    const cats = Object.entries(catMap).sort((a,b) => b[1] - a[1]).slice(0, 6);
    const maxCat = cats.length ? cats[0][1] : 1;
    const toplist = root.querySelector('#vt-toplist');
    toplist.innerHTML = cats.length
      ? cats.map(([name, val]) => `
        <div class="vt-toprow">
          <div class="vt-topname">${escapeHtml(name)}</div>
          <div class="vt-topbar-track"><div class="vt-topbar-fill" style="width:${(val/maxCat)*100}%"></div></div>
          <div class="vt-topval">${euro(val)}</div>
        </div>
      `).join('')
      : '<div class="vt-empty">Pas encore de données</div>';
  }

  function openPdf(url) {
    const modal = root.querySelector('#vt-pdf-modal');
    const frame = root.querySelector('#vt-pdf-frame');
    if (!modal || !frame) return;
    frame.src = url;
    modal.classList.add('open');
  }

  root.addEventListener('click', (e) => {
    const action = e.target.dataset.action;
    const id = e.target.dataset.id;
    if (action === 'next') advanceStatus(id).catch(showActionError);
    if (action === 'del') deleteOrder(id).catch(showActionError);
    if (action === 'edit') openEditForm(id);
    if (e.target.dataset.pdf) {
      e.preventDefault();
      openPdf(e.target.dataset.pdf);
    }
  });

  root.querySelector('#vt-pdf-close').addEventListener('click', () => {
    const modal = root.querySelector('#vt-pdf-modal');
    const frame = root.querySelector('#vt-pdf-frame');
    modal.classList.remove('open');
    frame.src = 'about:blank';
  });

  function openEditForm(id) {
    const order = orders.find(o => o.id === id);
    if (!order) return;
    editingId = id;
    root.querySelector('#f-article').value = order.article || '';
    root.querySelector('#f-buyer').value = order.buyer || '';
    root.querySelector('#f-price').value = order.price || '';
    root.querySelector('#f-category').value = order.category || '';
    root.querySelector('#f-tracking').value = order.tracking || '';
    root.querySelector('#f-notes').value = order.notes || '';
    root.querySelector('#f-postit').value = order.postit || '';
    root.querySelector('#f-date').value = (order.date || '').slice(0, 10);
    root.querySelector('#vt-form-title').textContent = 'Modifier la commande';
    root.querySelector('#vt-save-order').textContent = 'Mettre à jour';
    form.classList.add('open');
    form.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function resetForm() {
    editingId = null;
    root.querySelector('#vt-form-title').textContent = 'Nouvelle commande';
    root.querySelector('#vt-save-order').textContent = 'Enregistrer';
    ['f-article','f-buyer','f-price','f-category','f-tracking','f-notes','f-postit','f-tracking-files','f-voucher-files'].forEach(id => root.querySelector('#'+id).value = '');
  }

  function showActionError(error) {
    alert(error.message || 'Action impossible pour le moment.');
  }

  root.querySelectorAll('.vt-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      root.querySelectorAll('.vt-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      root.querySelector('#vt-view-board').style.display = target === 'board' ? 'block' : 'none';
      root.querySelector('#vt-view-stats').style.display = target === 'stats' ? 'block' : 'none';
    });
  });

  const form = root.querySelector('#vt-form');
  root.querySelector('#vt-toggle-form').addEventListener('click', () => {
    const willOpen = !form.classList.contains('open');
    if (!willOpen) {
      resetForm();
    } else if (!editingId) {
      resetForm();
      root.querySelector('#f-date').valueAsDate = new Date();
    }
    form.classList.toggle('open', willOpen);
  });
  root.querySelector('#vt-cancel-form').addEventListener('click', () => {
    form.classList.remove('open');
    resetForm();
  });

  root.querySelector('#vt-sync-vinted').addEventListener('click', async () => {
    if (!apiMode) {
      alert("La synchronisation Vinted necessite que l'API locale (api-server.ps1) soit lancee.");
      return;
    }
    await syncWithVinted();
  });

  root.querySelector('#vt-save-order').addEventListener('click', async () => {
    const article = root.querySelector('#f-article').value.trim();
    if (!article) { root.querySelector('#f-article').focus(); return; }
    const saveButton = root.querySelector('#vt-save-order');
    const wasEditing = editingId;
    saveButton.disabled = true;
    saveButton.textContent = wasEditing ? 'Mise à jour...' : 'Enregistrement...';
    try {
      const data = {
        article,
        buyer: root.querySelector('#f-buyer').value.trim(),
        price: root.querySelector('#f-price').value,
        category: root.querySelector('#f-category').value.trim() || 'Autre',
        tracking: root.querySelector('#f-tracking').value.trim(),
        notes: root.querySelector('#f-notes').value.trim(),
        postit: root.querySelector('#f-postit').value.trim(),
        date: root.querySelector('#f-date').value
      };

      if (wasEditing) {
        await updateOrder(wasEditing, data);
      } else {
        const [trackingPhotos, vouchers] = await Promise.all([
          collectAttachments('f-tracking-files'),
          collectAttachments('f-voucher-files')
        ]);
        data.attachments = { trackingPhotos, vouchers };
        await addOrder(data);
      }
      resetForm();
      form.classList.remove('open');
    } catch (error) {
      alert(error.message || "Impossible d'enregistrer la commande.");
    } finally {
      saveButton.disabled = false;
      saveButton.textContent = editingId ? 'Mettre à jour' : 'Enregistrer';
    }
  });

  loadOrders();
})();
