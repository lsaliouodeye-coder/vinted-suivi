<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi Vinted</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  .vt-root {
    --bg: #171512; --paper: #e7d9ba; --paper-line: #b8a377; --ink: #241f1c;
    --ink-soft: #55493a; --stamp-red: #a63a2e; --transit-mustard: #c2932f;
    --route-teal: #2f6b5e; --paper-shadow: rgba(0,0,0,0.35);
    background: var(--bg); color: var(--paper); font-family: 'Inter', sans-serif;
    border-radius: 12px; padding: 28px 24px 40px; min-height: 100vh; box-sizing: border-box;
  }
  .vt-root * { box-sizing: border-box; }
  .vt-header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; margin-bottom: 28px; border-bottom: 1px solid rgba(231,217,186,0.2); padding-bottom: 20px; }
  .vt-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--transit-mustard); margin: 0 0 6px; }
  .vt-header h1 { font-family: 'Oswald', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; font-size: 32px; margin: 0; color: var(--paper); }
  .vt-postmark { width: 118px; height: 118px; border-radius: 50%; border: 3px dashed var(--paper); display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotate(-6deg); flex-shrink: 0; font-family: 'Oswald', sans-serif; }
  .vt-pm-val { font-size: 22px; font-weight: 700; color: var(--paper); line-height: 1; }
  .vt-pm-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--transit-mustard); margin-top: 6px; text-align: center; }

  .vt-tabs { display: flex; gap: 4px; margin-bottom: 24px; }
  .vt-tab { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; font-size: 13px; font-weight: 600; background: transparent; color: rgba(231,217,186,0.55); border: 1px solid rgba(231,217,186,0.25); border-radius: 6px; padding: 9px 18px; cursor: pointer; transition: all 0.15s ease; }
  .vt-tab:hover { color: var(--paper); border-color: rgba(231,217,186,0.5); }
  .vt-tab.active { background: var(--paper); color: var(--ink); border-color: var(--paper); }

  .vt-addbar { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .vt-btn-add { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; font-size: 13px; background: var(--stamp-red); color: var(--paper); border: none; border-radius: 6px; padding: 11px 20px; cursor: pointer; }
  .vt-btn-add:hover { filter: brightness(1.1); }
  .vt-api-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(231,217,186,0.58); border: 1px solid rgba(231,217,186,0.22); border-radius: 999px; padding: 8px 11px; }
  .vt-api-badge.active { color: var(--route-teal); border-color: rgba(47,107,94,0.65); background: rgba(47,107,94,0.12); }

  #vt-notifs { margin-bottom: 14px; }
  .vt-notif { background: rgba(231,217,186,0.08); border: 1px solid rgba(231,217,186,0.18); color: var(--paper); padding: 8px 10px; border-radius: 8px; margin-top: 8px; font-size: 12px; }

  .vt-form { background: rgba(231,217,186,0.06); border: 1px solid rgba(231,217,186,0.18); border-radius: 10px; padding: 18px; margin-bottom: 24px; display: none; }
  .vt-form.open { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; }
  .vt-form label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--transit-mustard); display: block; margin-bottom: 6px; }
  .vt-form input, .vt-form select, .vt-form textarea { width: 100%; background: var(--paper); color: var(--ink); border: none; border-radius: 5px; padding: 9px 10px; font-family: 'Inter', sans-serif; font-size: 13px; }
  .vt-form textarea { resize: vertical; min-height: 44px; }
  .vt-form .vt-form-notes, .vt-form .vt-form-postit { grid-column: 1 / -1; }
  .vt-form-title { grid-column: 1 / -1; font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; font-weight: 600; color: var(--transit-mustard); margin: 0 0 -2px; }
  .vt-form .vt-form-actions { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 4px; }
  .vt-form .vt-save { background: var(--route-teal); color: var(--paper); border: none; border-radius: 6px; padding: 10px 18px; font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 12px; font-weight: 600; cursor: pointer; }
  .vt-form .vt-save:disabled { opacity: 0.65; cursor: wait; }
  .vt-form .vt-cancel { background: transparent; color: rgba(231,217,186,0.6); border: 1px solid rgba(231,217,186,0.3); border-radius: 6px; padding: 10px 18px; font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 12px; font-weight: 600; cursor: pointer; }
  .vt-form input[type="file"] { padding: 7px 8px; }
  .vt-form input[type="file"]::file-selector-button { background: var(--ink); color: var(--paper); border: none; border-radius: 4px; padding: 6px 9px; margin-right: 8px; font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 10px; cursor: pointer; }

  .vt-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  @media (max-width: 800px) { .vt-board { grid-template-columns: 1fr; } }
  .vt-col-head { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 13px; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px dashed rgba(231,217,186,0.25); display: flex; justify-content: space-between; }

  .vt-card::before { content: ""; position: absolute; top: -1px; left: 16px; width: 12px; height: 12px; background: var(--bg); border-radius: 50%; border-bottom: 1px solid var(--paper-line); }
  .vt-card::after  { content: ""; position: absolute; top: 8px; left: 0; right: 0; border-top: 1px dashed var(--paper-line); }

  .vt-card-actions { display: flex; gap: 6px; margin-top: 10px; }
  .vt-card-actions button { flex: 1; font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 10.5px; font-weight: 600; letter-spacing: 0.03em; border: none; border-radius: 4px; padding: 7px 6px; cursor: pointer; }
  .vt-btn-next { background: var(--ink); color: var(--paper); }
  .vt-btn-edit { background: transparent; color: var(--route-teal); border: 1px solid var(--route-teal) !important; }
  .vt-btn-del  { background: transparent; color: var(--stamp-red); border: 1px solid var(--stamp-red) !important; }
  .vt-card-notes { font-family: 'Inter', sans-serif; font-size: 11.5px; color: var(--ink-soft); background: rgba(36,31,28,0.06); border-radius: 5px; padding: 7px 9px; margin-top: 8px; white-space: pre-wrap; word-break: break-word; }
  .vt-card-notes .vt-notes-label { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft); opacity: 0.75; display: block; margin-bottom: 2px; }

  .vt-stat-num { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; color: var(--paper); }
  .vt-stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--transit-mustard); margin-top: 4px; }
  .vt-section-title { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; font-size: 14px; font-weight: 600; color: var(--paper); margin: 0 0 14px; }
  .vt-chart { display: flex; align-items: flex-end; gap: 14px; height: 160px; padding: 0 4px; margin-bottom: 30px; border-bottom: 1px solid rgba(231,217,186,0.2); }
  .vt-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .vt-bar { width: 60%; background: linear-gradient(to top, var(--stamp-red), var(--transit-mustard)); border-radius: 3px 3px 0 0; min-height: 3px; }
  .vt-bar-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: rgba(231,217,186,0.55); margin-top: 8px; text-transform: uppercase; }
  .vt-bar-val { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--paper); margin-bottom: 4px; }
  .vt-toplist { display: flex; flex-direction: column; gap: 8px; }
  .vt-toprow { display: flex; align-items: center; gap: 12px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .vt-topname { width: 130px; flex-shrink: 0; color: var(--paper); text-transform: uppercase; font-size: 11px; }
  .vt-topbar-track { flex: 1; background: rgba(231,217,186,0.1); border-radius: 4px; height: 10px; overflow: hidden; }
  .vt-topbar-fill { height: 100%; background: var(--route-teal); }
  .vt-topval { width: 60px; text-align: right; color: var(--transit-mustard); }

  .vt-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
  .vt-modal.open { display: flex; }
  .vt-modal-box { width: min(90vw, 1000px); height: min(80vh, 800px); background: #111; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.45); display: flex; flex-direction: column; }
  .vt-modal-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #1d1a17; color: #fff; font-family: 'Inter', sans-serif; }
  .vt-modal-close { background: var(--stamp-red); color: #fff; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; }

    .vt-board { grid-template-columns:1fr !important; }
    .vt-form.open { grid-template-columns:1fr !important; }
    .vt-stat-card { padding:12px; }
  }

  <script>
  (function() {
    // Remplacer par vos propres URL et clé anon depuis le projet Supabase
    const SUPABASE_URL = "https://fhqjuuicnlacajntzfml.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_df_l9X6zQmcW0ZWsL8gzqw_zScyRdaL";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log("URL :", SUPABASE_URL);
    console.log("KEY :", SUPABASE_ANON_KEY.substring(0,20));
    let orders = [];
    let editingId = null;
    const root = document.querySelector('.vt-root');

    /** Affiche une notification toast */
    function notify(msg) {
      const box = root.querySelector('#vt-notifs');
      const el = document.createElement('div');
      el.className = 'vt-notif';
      el.textContent = msg;
      box.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    /** Met à jour le badge de statut Supabase */
    function setApiStatus(text, ok) {
      const badge = root.querySelector('#vt-api-status');
      if (!badge) return;
      badge.textContent = text;
      badge.classList.toggle('active', ok);
    }

    /** Échappe le HTML pour éviter les injections (XSS) */
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({'&':'amp;','<':'lt;','>':'gt;','"':'quot;',"'":'39;'}[c]));
    }

    /** Lit un fichier et renvoie sa DataURL */
    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Impossible de lire ' + file.name));
        reader.readAsDataURL(file);
      });
    }

    /** Compresse une image à <MAX_IMAGE_SIDE> px et qualité choisie */
    async function compressImage(file) {
      const dataUrl = await readFileAsDataUrl(file);
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const MAX_SIDE = 1100, QUALITY = 0.74;
          const scale = Math.min(1, MAX_SIDE / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', QUALITY));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

    /** Collecte et uploade les fichiers attachés, renvoie tableau d'objets {id,name,type,url,addedAt} */
    async function uploadAttachments(orderId) {
      const result = { trackingPhotos: [], vouchers: [] };
      // Helper: upload un groupe de fichiers dans un dossier donné
      async function handleFiles(fileList, folder) {
        for (const file of fileList) {
          try {
            let blob;
            if (file.type.startsWith('image/')) {
              // Compresse l'image
              const dataUrl = await compressImage(file);
              const res = await fetch(dataUrl);
              blob = await res.blob();
            } else {
              blob = file; // PDF ou autre, on ne compresse pas
            }
            // Limite de taille 6MB
            if (blob.size > 6_000_000) {
              throw new Error(file.name + ' dépasse la taille maximale (6MB)');
            }
            const path = `${folder}/${orderId}/${Date.now()}_${file.name}`;
            // Upload vers Supabase Storage (cf. documentation Supabase Storage)
            const { error: uploadErr } = await supabaseClient
              .storage.from('attachments')
              .upload(path, blob, { cacheControl: '3600', contentType: file.type });
            if (uploadErr) {
              throw uploadErr;
            }
            // Obtenir l'URL publique du fichier uploadé
            const { data: { publicUrl } } = supabaseClient
              .storage.from('attachments')
              .getPublicUrl(path);
            result[folder].push({
              id: crypto.randomUUID(),
              name: file.name,
              type: file.type,
              url: publicUrl,
              addedAt: new Date().toISOString()
            });
          } catch (err) {
            console.error('Upload failed', err);
            notify("Impossible d'uploader " + file.name + ". Mode hors-ligne activé.");
            // En cas d'échec, on pourrait stocker localement... (non implémenté ici)
          }
        }
      }
      await handleFiles(document.querySelector('#f-tracking-files').files, 'trackingPhotos');
      await handleFiles(document.querySelector('#f-voucher-files').files, 'vouchers');
      return result;
    }

    /** Charge toutes les commandes depuis Supabase */
    async function loadOrders() {
      try {
        const { data, error } = await supabaseClient
          .from('orders')
          .select('*')
          .order('date', { ascending: false });
        if (error) throw error;
        orders = data || [];
        setApiStatus("Supabase connecté", true);
        render();
      } catch (err) {
        console.error(err);
        setApiStatus("Hors ligne", false);
        notify("Erreur Supabase : " + err.message);
      }
    }

    /** Crée ou met à jour une commande */
    async function saveOrder() {
      const article = root.querySelector('#f-article').value.trim();
      if (!article) { root.querySelector('#f-article').focus(); return; }
      const buyer    = root.querySelector('#f-buyer').value.trim();
      const priceVal = parseFloat(root.querySelector('#f-price').value);
      const price    = isNaN(priceVal) ? 0 : priceVal;
      const category = root.querySelector('#f-category').value.trim() || 'Autre';
      const tracking = root.querySelector('#f-tracking').value.trim();
      const notes    = root.querySelector('#f-notes').value.trim();
      const postit   = root.querySelector('#f-postit').value.trim();
      const date     = root.querySelector('#f-date').value || new Date().toISOString().slice(0,10);

      try {
        if (editingId) {
          // Mise à jour des champs (hors pièces jointes)
          await supabaseClient
            .from('orders')
            .update({ article, buyer, price, category, tracking, notes, postit, date })
            .eq('id', editingId);
          notify("Commande mise à jour");
        } else {
          // Création d'une nouvelle commande (attachments vides au départ)
          const { data: newOrder, error } = await supabaseClient
            .from('orders')
            .insert({ article, buyer, price, category, tracking, notes, postit, date, status: 'a_preparer', attachments: {trackingPhotos:[], vouchers:[]} })
            .select().single(); // renvoie le nouvel objet complet
          if (error) throw error;
          const id = newOrder.id;
          // Uploader les fichiers attachés et construire JSON attachments
          const attachments = await uploadAttachments(id);
          // Mettre à jour la commande avec les URLs des pièces jointes
          await supabaseClient
            .from('orders')
            .update({ attachments })
            .eq('id', id);
          notify("Commande ajoutée");
        }
        // Réinitialiser le formulaire
        closeForm();
        await loadOrders();
      } catch (err) {
        console.error(err);
        alert("Erreur lors de l'enregistrement : " + err.message);
      }
    }

    /** Supprime une commande par ID */
    async function deleteOrder(id) {
      if (!confirm("Supprimer cette commande ?")) return;
      try {
        await supabaseClient.from('orders').delete().eq('id', id); //
        notify("Commande supprimée");
        orders = orders.filter(o => o.id !== id);
        render();
      } catch (err) {
        console.error(err);
        notify("Erreur de suppression");
      }
    }

    /** Change le statut de la commande (a_preparer → expedie → livre) */
    async function advanceStatus(id) {
      const order = orders.find(o => o.id === id);
      if (!order) return;
      let next = order.status;
      if      (next === 'a_preparer') next = 'expedie';
      else if (next === 'expedie')    next = 'livre';
      try {
        await supabaseClient
          .from('orders')
          .update({ status: next })
          .eq('id', id);
        notify("Statut mis à jour");
        await loadOrders();
      } catch (err) {
        console.error(err);
        notify("Erreur statut");
      }
    }

    /** Affiche le formulaire d'édition d'une commande existante */
    function openEditForm(id) {
      const order = orders.find(o => o.id === id);
      if (!order) return;
      editingId = id;
      root.querySelector('#f-article').value = order.article || '';
      root.querySelector('#f-buyer').value  = order.buyer || '';
      root.querySelector('#f-price').value  = order.price || '';
      root.querySelector('#f-category').value = order.category || '';
      root.querySelector('#f-tracking').value = order.tracking || '';
      root.querySelector('#f-notes').value   = order.notes || '';
      root.querySelector('#f-postit').value  = order.postit || '';
      root.querySelector('#f-date').value    = (order.date || '').slice(0,10);
      root.querySelector('#vt-form-title').textContent = 'Modifier la commande';
      root.querySelector('#vt-save-order').textContent = 'Mettre à jour';
      openForm();
    }

    /** Réinitialise le formulaire au mode "Nouvelle commande" */
    function resetForm() {
      editingId = null;
      root.querySelector('#vt-form-title').textContent = 'Nouvelle commande';
      root.querySelector('#vt-save-order').textContent = 'Enregistrer';
      ['f-article','f-buyer','f-price','f-category','f-tracking','f-notes','f-postit',
       'f-tracking-files','f-voucher-files','f-date']
        .forEach(id => { const el = root.querySelector('#'+id); if(el) el.value = ''; });
    }

    /** Affiche le formulaire */
    function openForm() {
      root.querySelector('#vt-form').classList.add('open');
root.querySelector('#f-article').focus();
    }
    /** Ferme le formulaire */
    function closeForm() {
      root.querySelector('#vt-form').classList.remove('open');
      resetForm();
    }

    /** Génère l'HTML d'une carte de commande */
    function renderCard(o) {
      const nextBtn = (o.status === 'a_preparer') ? 'Marquer expédiée'
                    : (o.status === 'expedie')    ? 'Marquer livrée' : null;
      // Échapper le contenu pour la sécurité
      const article = escapeHtml(o.article), buyer = escapeHtml(o.buyer);
      const notes = escapeHtml(o.notes), postit = escapeHtml(o.postit), tracking = escapeHtml(o.tracking);
      // Construire la partie pièces jointes si nécessaire
      function renderAttachment(file) {
        const href = escapeHtml(file.url);
        const name = escapeHtml(file.name);
        const label = file.type.includes('pdf') ? 'PDF' : 'IMG';
        if (file.type.startsWith('image/')) {
          return `<a class="vt-thumb" href="${href}" target="_blank" download="${name}" title="${name}"><img src="${href}" alt="${name}"></a>`;
        }
        // PDF ou autre
        return `<a class="vt-doc" href="${href}" target="_blank" data-pdf="${href}" title="${name}">${label}</a>`;
      }
      let attachHtml = '';
      if (o.attachments) {
        ['trackingPhotos','vouchers'].forEach(group => {
          if (Array.isArray(o.attachments[group]) && o.attachments[group].length) {
            const title = group === 'trackingPhotos' ? 'Preuves suivi' : "Bons d'achat";
            const list = o.attachments[group].map(renderAttachment).join('');
            attachHtml += `<div class="vt-attachments"><div class="vt-attach-title">${title}</div><div class="vt-attach-list">${list}</div></div>`;
          }
        });
      }
      return `
        <div class="vt-card" data-id="${o.id}">
          <div class="vt-card-body">
            <div class="vt-card-top">
              <div class="vt-card-article">${article}</div>
<div class="vt-card-price">${Number(o.price || 0).toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:2})}€</div>            </div>
            <div class="vt-card-buyer">${buyer ? '@'+buyer : '<em>Acheteur non renseigné</em>'}</div>
            <div class="vt-card-meta"><span>${escapeHtml(o.category)}</span><span>${new Date(o.date).toLocaleDateString('fr-FR')}</span></div>
            ${tracking ? `<div class="vt-card-meta"><span>Suivi</span><span>${tracking}</span></div>` : ''}
            ${notes ? `<div class="vt-card-notes"><span class="vt-notes-label">Notes</span>${notes}</div>` : ''}
            ${postit ? `<div class="vt-card-notes"><span class="vt-notes-label">Post-it</span>${postit}</div>` : ''}
            ${attachHtml}
            <div class="vt-card-actions">
              ${nextBtn ? `<button class="vt-btn-next" data-id="${o.id}">${nextBtn}</button>` : ''}
              <button class="vt-btn-edit" data-id="${o.id}">Modifier</button>
              <button class="vt-btn-del" data-id="${o.id}">Suppr.</button>
            </div>
          </div>
        </div>`;
    }

    /** Met à jour l'affichage Kanban et les compteurs */
    function render() {
      ['a_preparer','expedie','livre'].forEach(status => {
        const col = root.querySelector('#col-' + status);
        const list = orders.filter(o => o.status === status);
        col.innerHTML = list.length
          ? list.map(renderCard).join('')
          : '<div class="vt-empty">Aucune commande</div>';
        root.querySelector('#count-' + status).textContent = list.length;
      });
      // Chiffre du mois courant
      const now = new Date(), mois = now.getMonth(), annee = now.getFullYear();
      const thisMonthRev = orders.filter(o => {
        const d = new Date(o.date);
        return d.getMonth() === mois && d.getFullYear() === annee;
      }).reduce((s,o) => s+o.price, 0);
      root.querySelector('#vt-pm-val').textContent = thisMonthRev.toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:2}) + '€';
      renderStats();
    }

    /** Calcule et affiche les statistiques et graphiques */
    function renderStats() {
      const totalRev = orders.reduce((s,o) => s+o.price, 0);
      root.querySelector('#stat-total-rev').textContent = totalRev.toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:2}) + '€';
      root.querySelector('#stat-count').textContent = orders.length;
      root.querySelector('#stat-avg').textContent = orders.length
        ? (totalRev/orders.length).toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:2}) + '€'
        : '0€';
      root.querySelector('#stat-pending').textContent = orders.filter(o => o.status === 'a_preparer').length;

      // Graphique revenu 6 derniers mois
      // Graphique revenu 6 derniers mois
const now = new Date();
const months = [];
const chart = root.querySelector('#vt-chart');

for (let i = 5; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
        months.push({ label: d.toLocaleDateString('fr-FR',{month:'short'}), rev: 0 });
      }
      months.forEach((m,i) => {
        m.rev = orders.filter(o => {
          const d = new Date(o.date);
          return d.getFullYear() === new Date().getFullYear() - ((now.getMonth()-i<0)?1:0)
              && d.getMonth() === (now.getMonth()-i+12)%12;
        }).reduce((s,o)=>s+o.price, 0);
      });
      const maxRev = Math.max(...months.map(m=>m.rev),1);
      chart.innerHTML = months.map(m => `
        <div class="vt-bar-wrap">
          <div class="vt-bar-val">${m.rev > 0 ? m.rev.toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:2})+'€' : ''}</div>
          <div class="vt-bar" style="height:${Math.max((m.rev/maxRev)*100,2)}%"></div>
          <div class="vt-bar-label">${m.label}</div>
        </div>`).join('');

      // Top catégories
      const catMap = {};
      orders.forEach(o => { catMap[o.category] = (catMap[o.category]||0)+o.price; });
      const cats = Object.entries(catMap).sort((a,b) => b[1]-a[1]).slice(0,6);
      const maxCat = cats[0] ? cats[0][1] : 1;
      const toplist = root.querySelector('#vt-toplist');
      toplist.innerHTML = cats.length
        ? cats.map(([name,val]) => `
            <div class="vt-toprow">
              <div class="vt-topname">${escapeHtml(name)}</div>
              <div class="vt-topbar-track"><div class="vt-topbar-fill" style="width:${(val/maxCat)*100}%"></div></div>
              <div class="vt-topval">${val.toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:2})}€</div>
            </div>`).join('')
        : '<div class="vt-empty">Pas encore de données</div>';
    }

    /** Ouvre la modal d'aperçu PDF */
    function openPdf(url) {
      const modal = root.querySelector('#vt-pdf-modal');
      const frame = root.querySelector('#vt-pdf-frame');
      frame.src = url; modal.classList.add('open');
    }

    // Gestion des clics sur les boutons d'action
    root.addEventListener('click', (e) => {
      const id = e.target.dataset.id;
      if (e.target.matches('.vt-btn-next'))    advanceStatus(id);
      if (e.target.matches('.vt-btn-del'))     deleteOrder(id);
      if (e.target.matches('.vt-btn-edit'))    openEditForm(id);
      if (e.target.matches('.vt-tab')) {
        // Changer d'onglet
        root.querySelectorAll('.vt-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const tab = e.target.dataset.tab;
        root.querySelector('#vt-view-board').style.display = (tab==='board'?'block':'none');
        root.querySelector('#vt-view-stats').style.display = (tab==='stats'?'block':'none');
      }
      if (e.target.matches('.vt-modal-close')) {
        root.querySelector('#vt-pdf-modal').classList.remove('open');
        root.querySelector('#vt-pdf-frame').src = 'about:blank';
      }
    });

    // Boutons spécifiques
    root.querySelector('#vt-toggle-form').addEventListener('click', () => {
      openForm();
    });
    root.querySelector('#vt-cancel-form').addEventListener('click', (e) => {
      e.preventDefault();
      closeForm();
    });
    root.querySelector('#vt-save-order').addEventListener('click', (e) => {
      e.preventDefault();
      saveOrder();
    });

    // Abonnement Realtime sur la table orders (INSERT/UPDATE/DELETE)
    supabaseClient
      .channel('orders-channel')
      .on('postgres_changes', { schema: 'public', table: 'orders', event: '*' }, payload => {
        loadOrders(); // Recharge les données en cas de changement
      })
      .subscribe();

    // Chargement initial
    loadOrders();
  })();
  </script>
</body>
</html>
